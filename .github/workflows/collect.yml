# 每日采集管道(阶段 1)。
#
# 一次跑法:R2 拉 data.db → 采集各源写库 → R2 推回 → 提交 status.json 当心跳。
# 每天两次错峰(分钟用 17/47,不用整点——避开整点全网 cron 拥堵、也降低撞源限速的概率)。
# 心跳:每次提交 status.json 给仓库制造活动,防 GitHub 60 天无活动禁用 scheduled workflow。
#
# 需要的 Actions secrets(仓库 Settings → Secrets and variables → Actions):
#   R2_ACCOUNT_ID  R2_ACCESS_KEY_ID  R2_SECRET_ACCESS_KEY  R2_BUCKET  S3_API_ENDPOINT
# GITHUB_TOKEN 用 Actions 自带的(读 public repo 的 GraphQL,额度足够),无需手动加。

name: collect

on:
  schedule:
    - cron: '17 1 * * *'   # 每天 01:17 UTC
    - cron: '47 13 * * *'  # 每天 13:47 UTC(约 12h 错峰)
  workflow_dispatch: {}     # 允许手动触发(首次冷启动/调试用)

# 串行,绝不并发:两次跑同时写同一个 R2 data.db 会互相覆盖。
concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write           # 提交 status.json 心跳需要

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      DB_PATH: data.db
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      S3_API_ENDPOINT: ${{ secrets.S3_API_ENDPOINT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ubuntu runner 自带 sqlite3;显式确认一下,缺了就装。
      - name: Ensure sqlite3
        run: sqlite3 --version || (sudo apt-get update && sudo apt-get install -y sqlite3)

      # 冷启动时 R2 里还没有 data.db,pull 会打印"不存在"并跳过,run.mjs 自动建表。
      - name: Pull data.db from R2
        run: node src/r2.mjs pull data.db "$DB_PATH"

      - name: Collect
        run: node src/run.mjs

      - name: Push data.db to R2
        # 即便采集部分失败(run.mjs 非零退出),已落盘的数据也要推上去 —— 用 always()。
        if: always()
        run: node src/r2.mjs push data.db "$DB_PATH"

      - name: Write status.json (heartbeat)
        if: always()
        run: node src/report.mjs "$DB_PATH" status.json

      - name: Commit heartbeat
        if: always()
        run: |
          git config user.name  "aiagent-club-bot"
          git config user.email "actions@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "chore: heartbeat $(date -u +%FT%TZ)"
          git push
